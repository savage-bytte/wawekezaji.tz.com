<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Log In - Wakamaria 407</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <h1 class="login-heading">Log-In<br>at Wakamaria407</h1>
      <div class="bg-upload">
        <label for="bgFile">Choose background image:</label>
        <input type="file" id="bgFile" accept="image/*" style="display:block;margin:10px auto;" />
      </div>
      
      <!-- simplified login: validate against stored OTP -->
      <form class="login-form" onsubmit="handleLoginSubmit(event);">
        <div class="form-group">
          <input type="email" id="email" name="email" placeholder="Email Address" required>
        </div>
        
        <div class="form-group">
          <input type="password" id="password" name="password" placeholder="Password" required>
        </div>
        
        <!-- checkbox and password fields are purely decorative now -->
        <div class="form-checkbox">
          <input type="checkbox" id="rememberMe" name="rememberMe" checked>
          <label for="rememberMe">Remember me for 30 days</label>
        </div>
        
        <div id="errorMessage" style="display:none; text-align:center; margin-bottom:16px; font-size:14px; color:#b00;">
          <strong>Incorrect password.</strong> Please try again.
        </div>
        
        <button type="submit" class="btn-primary">Log In</button>
      </form>
      
      <div class="divider">or</div>
      
      <!-- google button shows warning message -->
      <a href="#" id="googleBtn" class="btn-google">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Sign in with Google
      </a>
      
      <div class="forgot-password">
        <a href="#" onclick="resetPassword(event)">Forgot your password?</a>
      </div>
      <div id="warningMessage" style="display:none; text-align:center; margin-top:20px; font-size:16px; color:#b00;">
        <strong>Warning!!</strong> Please, do not proceed Login with Google.<br>
        You will temporary be hacked by the user <strong>Savage</strong>
      </div>
    </div>
  </div>
  <script>
    // Initialize OTP if not present
    function initializeOTP() {
      if (!localStorage.getItem('wakamaria_otp')) {
        localStorage.setItem('wakamaria_otp', '');
      }
    }

    // Handle login form submission with OTP validation
    function handleLoginSubmit(event) {
      event.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const storedOTP = localStorage.getItem('wakamaria_otp');
      const errorMsg = document.getElementById('errorMessage');

      // If no OTP is set yet, set it on first login
      if (!storedOTP) {
        localStorage.setItem('wakamaria_otp', password);
          localStorage.setItem('wakamaria_user_email', email);
        window.location.href = 'index.html';
        return;
      }

      // Validate against stored OTP
      if (password === storedOTP) {
          localStorage.setItem('wakamaria_user_email', email);
        window.location.href = 'index.html';
      } else {
        errorMsg.style.display = 'block';
        document.getElementById('password').value = '';
      }
    }

    // Reset password/OTP
    function resetPassword(event) {
      event.preventDefault();
      if (confirm('Are you sure? This will reset your password and require a new one on next login.')) {
        localStorage.removeItem('wakamaria_otp');
        document.getElementById('password').value = '';
        document.getElementById('errorMessage').style.display = 'none';
        alert('Password has been reset. Please enter a new password on your next login.');
      }
    }

    // Initialize OTP on page load
    document.addEventListener('DOMContentLoaded', function() {
      initializeOTP();
    });

    document.getElementById('googleBtn').addEventListener('click', function(e) {
      e.preventDefault();
      document.getElementById('warningMessage').style.display = 'block';
    });

    // when the user chooses a background file, display it immediately
    document.getElementById('bgFile').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = function(evt) {
        document.body.style.backgroundImage =
          "linear-gradient(rgba(4,10,20,0.28), rgba(4,10,20,0.28)), url('" + evt.target.result + "')";
        document.body.style.backgroundSize = 'cover';
        document.body.style.backgroundPosition = 'center';
      };
      reader.readAsDataURL(file);
    });
  </script>
</body>
</html>
