<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Forgot Password - Wakamaria 407</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <h1 class="login-heading">Reset Password<br>at Wakamaria407</h1>
      
      <form method="post" action="/forgot-password" class="login-form">
        <p class="form-instructions">Enter your email address and we'll send you a link to reset your password.</p>
        <div class="form-group">
          <input type="email" name="email" placeholder="Email Address" required>
        </div>
        <button type="submit" class="btn-primary">Send Reset Link</button>
      </form>
      
      <div class="back-to-login">
        <a href="/login">Back to Log In</a>
      </div>
    </div>
  </div>
</body>
</html>
