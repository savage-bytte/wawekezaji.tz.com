<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Reset Password - Wakamaria 407</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="login-page">
  <div class="login-container">
    <div class="login-card">
      <h1 class="login-heading">Create New Password<br>at Wakamaria407</h1>
      
      <form method="post" class="login-form" id="resetForm">
        <p class="form-instructions">Enter your new password below.</p>
        <div class="form-group">
          <input type="password" name="password" placeholder="New Password" required minlength="6">
        </div>
        <div class="form-group">
          <input type="password" name="confirmPassword" placeholder="Confirm Password" required minlength="6">
        </div>
        <button type="submit" class="btn-primary">Reset Password</button>
      </form>
      
      <div class="back-to-login">
        <a href="/login">Back to Log In</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('resetForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      const password = document.querySelector('input[name="password"]').value;
      const confirmPassword = document.querySelector('input[name="confirmPassword"]').value;
      
      if(password !== confirmPassword) {
        alert('Passwords do not match!');
        return;
      }
      
      const token = new URLSearchParams(window.location.search).get('token');
      try {
        const res = await fetch('/reset-password', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({token, password})
        });
        const data = await res.json();
        if(data.success) {
          alert('Password reset successfully! Redirecting to login...');
          window.location.href = '/login';
        } else {
          alert('Error: ' + (data.message || 'Reset failed'));
        }
      } catch(err) {
        alert('Error resetting password: ' + err.message);
      }
    });
  </script>
</body>
</html>
